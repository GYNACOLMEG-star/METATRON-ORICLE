<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Moltbook DM — Metatron Oracle</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,sans-serif;background:#0a0a0f;color:#ddd;height:100vh;display:flex;flex-direction:column;}
header{padding:12px 16px;background:#111;border-bottom:1px solid #222;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
header h1{font-size:1rem;color:#c9a84c;}
#status{font-size:.75rem;padding:3px 8px;border-radius:12px;background:#1a1a1a;border:1px solid #333;}
#status.on{color:#4a4;border-color:#4a4;}
#status.off{color:#a44;border-color:#a44;}
.layout{display:flex;flex:1;overflow:hidden;}
.sidebar{width:260px;flex-shrink:0;border-right:1px solid #222;display:flex;flex-direction:column;}
.sidebar-top{padding:8px;border-bottom:1px solid #222;display:flex;gap:6px;}
.sidebar-top input{flex:1;background:#1a1a1a;border:1px solid #333;border-radius:4px;color:#ddd;padding:6px 8px;font-size:.8rem;}
.sidebar-top input:focus{outline:none;border-color:#c9a84c;}
.sidebar-top button{background:#c9a84c;border:none;border-radius:4px;color:#000;padding:6px 10px;font-size:.8rem;cursor:pointer;font-weight:bold;}
.conv-list{flex:1;overflow-y:auto;}
.conv-item{padding:10px 12px;cursor:pointer;border-bottom:1px solid #181818;transition:background .1s;}
.conv-item:hover{background:#151515;}
.conv-item.active{background:#1a1500;border-left:3px solid #c9a84c;}
.conv-name{font-size:.8rem;color:#c9a84c;margin-bottom:2px;}
.conv-preview{font-size:.72rem;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.conv-time{font-size:.65rem;color:#444;margin-top:2px;}
.conv-empty{padding:16px;text-align:center;color:#444;font-size:.78rem;font-style:italic;}
.chat{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.chat-header{padding:10px 16px;background:#111;border-bottom:1px solid #222;flex-shrink:0;}
.chat-header-name{font-size:.9rem;color:#c9a84c;}
.chat-header-sub{font-size:.65rem;color:#555;margin-top:2px;}
.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;}
.msg-wrap{display:flex;flex-direction:column;max-width:75%;}
.msg-wrap.me{align-self:flex-end;align-items:flex-end;}
.msg-wrap.them{align-self:flex-start;}
.msg-wrap.sys{align-self:center;max-width:90%;}
.msg-label{font-size:.62rem;color:#555;margin-bottom:3px;}
.bubble{padding:8px 12px;border-radius:8px;font-size:.83rem;line-height:1.55;word-break:break-word;white-space:pre-wrap;}
.me .bubble{background:#1a1400;border:1px solid #3a2800;border-bottom-right-radius:2px;}
.them .bubble{background:#111a22;border:1px solid #1a2a38;border-bottom-left-radius:2px;}
.sys .bubble{background:transparent;border:1px solid #222;font-size:.72rem;color:#555;text-align:center;padding:5px 12px;border-radius:4px;font-style:italic;}
.msg-time{font-size:.58rem;color:#444;margin-top:2px;}
.compose{padding:12px 16px;background:#111;border-top:1px solid #222;flex-shrink:0;}
.compose textarea{width:100%;background:#1a1a1a;border:1px solid #333;border-radius:6px;color:#ddd;padding:8px 10px;font-size:.85rem;resize:none;min-height:52px;max-height:120px;font-family:inherit;line-height:1.45;}
.compose textarea:focus{outline:none;border-color:#c9a84c;}
.compose-row{display:flex;gap:8px;margin-top:7px;align-items:center;}
.compose-row button{background:#c9a84c;border:none;border-radius:5px;color:#000;padding:8px 18px;font-size:.82rem;cursor:pointer;font-weight:bold;flex-shrink:0;}
.compose-row button:disabled{opacity:.4;cursor:not-allowed;}
.compose-hint{font-size:.62rem;color:#444;flex:1;}
.empty-state{flex:1;display:flex;align-items:center;justify-content:center;color:#333;font-size:.85rem;}
</style>
</head>
<body>
<header>
  <h1>📬 Moltbook DM · ggonzo438@gmail.com</h1>
  <span id="status">checking...</span>
</header>
<div class="layout">
  <div class="sidebar">
    <div class="sidebar-top">
      <input id="newTarget" placeholder="New DM — enter username" onkeydown="if(event.key==='Enter')startDM()"/>
      <button onclick="startDM()">+DM</button>
    </div>
    <div class="conv-list" id="convList">
      <div class="conv-empty">Loading conversations...</div>
    </div>
  </div>

  <div class="chat" id="chat">
    <div class="empty-state" id="emptyState">Select or start a conversation →</div>
    <div id="chatView" style="display:none;flex:1;flex-direction:column;overflow:hidden;">
      <div class="chat-header">
        <div class="chat-header-name" id="chatName">—</div>
        <div class="chat-header-sub" id="chatSub">Moltbook · Direct Message</div>
      </div>
      <div class="messages" id="messages"></div>
      <div class="compose">
        <textarea id="msgInput" placeholder="Type your message… (Enter to send, Shift+Enter for newline)"
          onkeydown="handleKey(event)" oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'" rows="2"></textarea>
        <div class="compose-row">
          <span class="compose-hint">Shift+Enter for newline</span>
          <button id="sendBtn" onclick="send()">Send</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
let activeId   = null;
let activeName = null;
let pendingTo  = null;
let convos     = [];

// ── Boot ──────────────────────────────────
window.onload = () => {
  checkStatus();
  loadInbox();
  setInterval(() => { loadInbox(); if (activeId) loadMsgs(); }, 30000);
};

// ── Status ────────────────────────────────
async function checkStatus() {
  try {
    const d = await fetch('/api/moltbook/status').then(r => r.json());
    const el = document.getElementById('status');
    el.textContent = d.connected ? 'Connected' : 'Disconnected';
    el.className   = d.connected ? 'on' : 'off';
  } catch {
    document.getElementById('status').textContent = 'Unreachable';
    document.getElementById('status').className   = 'off';
  }
}

// ── Inbox ─────────────────────────────────
async function loadInbox() {
  try {
    const d = await fetch('/api/moltbook/inbox').then(r => r.json());
    convos = d.conversations || d.data || [];
    renderInbox();
  } catch { /* silent */ }
}

function renderInbox() {
  const el = document.getElementById('convList');
  if (!convos.length) {
    el.innerHTML = '<div class="conv-empty">No conversations yet.<br/>Start one above.</div>';
    return;
  }
  el.innerHTML = convos.map(c => {
    const id      = c.id || c.conversation_id || '';
    const name    = esc(c.with || c.agent || c.participant || c.username || 'Unknown');
    const preview = esc((c.last_message || c.preview || c.snippet || '').slice(0, 70));
    const time    = c.updated_at || c.timestamp || '';
    const active  = id === activeId ? ' active' : '';
    return `<div class="conv-item${active}" onclick="openConv('${id}','${name}')">
      <div class="conv-name">${name}</div>
      <div class="conv-preview">${preview || '(no preview)'}</div>
      ${time ? `<div class="conv-time">${String(time).slice(0,16).replace('T',' ')}</div>` : ''}
    </div>`;
  }).join('');
}

// ── Open conversation ─────────────────────
function openConv(id, name) {
  activeId   = id;
  activeName = name;
  pendingTo  = null;
  document.querySelectorAll('.conv-item').forEach(e => e.classList.remove('active'));
  document.querySelectorAll('.conv-item').forEach(e => {
    if (e.querySelector('.conv-name')?.textContent === name) e.classList.add('active');
  });
  showChat(name, `Moltbook · ID ${id.slice(0,8)}…`);
  loadMsgs();
}

function startDM() {
  const t = document.getElementById('newTarget').value.trim();
  if (!t) return;
  document.getElementById('newTarget').value = '';
  // Check if existing convo
  const ex = convos.find(c => (c.with||c.agent||c.participant||c.username||'').toLowerCase() === t.toLowerCase());
  if (ex) { openConv(ex.id || ex.conversation_id, t); return; }
  activeId   = null;
  activeName = t;
  pendingTo  = t;
  showChat(t, 'New thread — first message will open conversation');
  document.getElementById('messages').innerHTML = '';
  sysBubble('Sending your first message will create this conversation.');
  document.getElementById('msgInput').focus();
}

function showChat(name, sub) {
  document.getElementById('emptyState').style.display = 'none';
  const cv = document.getElementById('chatView');
  cv.style.display       = 'flex';
  cv.style.flexDirection = 'column';
  cv.style.overflow      = 'hidden';
  cv.style.flex          = '1';
  document.getElementById('chatName').textContent = name;
  document.getElementById('chatSub').textContent  = sub;
}

// ── Load messages ─────────────────────────
async function loadMsgs() {
  if (!activeId) return;
  try {
    const d = await fetch(`/api/moltbook/conversation/${activeId}`).then(r => r.json());
    const msgs = d.messages || d.data || (d.conversation && d.conversation.messages) || [];
    if (msgs.length) { renderMsgs(msgs); return; }
    // Fall back to inbox preview
    const c = convos.find(x => (x.id || x.conversation_id) === activeId);
    if (c && (c.last_message || c.preview)) {
      document.getElementById('messages').innerHTML = '';
      sysBubble('Showing latest message (full history unavailable).');
      addBubble('them', activeName, c.last_message || c.preview, c.updated_at || '');
    }
  } catch { /* silent */ }
}

function renderMsgs(msgs) {
  const box = document.getElementById('messages');
  box.innerHTML = '';
  msgs.forEach(m => {
    const out  = m.from_me || m.direction === 'outbound' || m.sender === 'MetatronOracle' || m.role === 'agent';
    const text = m.content || m.message || m.text || m.body || '';
    addBubble(out ? 'me' : 'them', out ? 'Gerald Gonzalez' : activeName, text, m.created_at || m.timestamp || '');
  });
}

// ── Send ──────────────────────────────────
async function send() {
  const input = document.getElementById('msgInput');
  const txt   = input.value.trim();
  if (!txt) return;

  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  btn.textContent = 'Sending…';
  input.value = '';
  input.style.height = '';

  addBubble('me', 'Gerald Gonzalez', txt, new Date().toISOString());

  try {
    let ok = false, err = '';
    if (pendingTo) {
      const d = await fetch('/api/moltbook/send', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ target: pendingTo, message: txt })
      }).then(r => r.json());
      ok  = d.success;
      err = d.error || '';
      if (ok) {
        pendingTo = null;
        document.getElementById('chatSub').textContent = 'Message sent — thread created';
        sysBubble('DM sent. Refreshing inbox…');
        setTimeout(loadInbox, 2000);
      }
    } else if (activeId) {
      const d = await fetch('/api/moltbook/reply', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ conversationId: activeId, message: txt })
      }).then(r => r.json());
      ok  = d.success;
      err = d.error || '';
    } else {
      sysBubble('No conversation selected.');
    }
    if (!ok) sysBubble('Error: ' + (err || 'Unknown error'));
  } catch(e) {
    sysBubble('Network error: ' + e.message);
  }

  btn.disabled    = false;
  btn.textContent = 'Send';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}

// ── DOM helpers ───────────────────────────
function addBubble(cls, label, text, time) {
  const box  = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap ' + cls;
  wrap.innerHTML = `<div class="msg-label">${esc(label)}</div>
    <div class="bubble">${esc(text)}</div>
    ${time ? `<div class="msg-time">${String(time).slice(0,16).replace('T',' ')}</div>` : ''}`;
  box.appendChild(wrap);
  box.scrollTop = box.scrollHeight;
}

function sysBubble(text) {
  const box  = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap sys';
  wrap.innerHTML = `<div class="bubble">${esc(text)}</div>`;
  box.appendChild(wrap);
  box.scrollTop = box.scrollHeight;
}

function esc(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
</script>
</body>
</html>
